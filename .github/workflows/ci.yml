name: ci

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZenithArch.slnx

      - name: Build
        run: dotnet build ZenithArch.slnx --configuration Release --no-restore

      - name: Validate Abstractions target frameworks
        run: |
          for tfm in netstandard2.0 netstandard2.1 net6.0 net8.0 net9.0; do
            echo "Building ZenithArch.Abstractions for $tfm"
            dotnet build src/ZenithArch.Abstractions/ZenithArch.Abstractions.csproj --configuration Release --no-restore --framework "$tfm"
          done

      - name: Test
        run: dotnet test ZenithArch.slnx --configuration Release --no-build

      - name: Abstractions coverage gate (80% line)
        run: |
          echo "Enforcing Abstractions line coverage threshold: 80%"
          dotnet test tests/ZenithArch.Abstractions.Tests/ZenithArch.Abstractions.Tests.csproj \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutput=./TestResults/Coverage/ \
            /p:CoverletOutputFormat=cobertura \
            /p:Include="[ZenithArch.Abstractions]*" \
            /p:Threshold=80 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total

      - name: Upload Abstractions coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: abstractions-coverage
          path: tests/ZenithArch.Abstractions.Tests/TestResults/Coverage/**

      - name: Vulnerability audit
        run: dotnet list ZenithArch.slnx package --vulnerable --include-transitive

  pack:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZenithArch.slnx

      - name: Build, test, and pack
        run: ./publish.ps1 -Increment None
        shell: pwsh

      - name: Prepare local feed
        run: |
          mkdir -p local-feed
          cp artifacts/*.nupkg local-feed/

      - name: NuGet package integration tests
        run: dotnet test tests/ZenithArch.NuGetIntegration.Tests/ZenithArch.NuGetIntegration.Tests.csproj --configuration Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  performance:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ZenithArch.slnx

      - name: Run generator performance benchmarks (dry)
        run: dotnet run --project tests/ZenithArch.Performance.Tests/ZenithArch.Performance.Tests.csproj -c Release -- --filter *RunGenerator* --job Dry

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generator-performance-benchmarks
          path: tests/ZenithArch.Performance.Tests/BenchmarkDotNet.Artifacts/results/**

  publish:
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: artifacts

      - name: Validate publish secret
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is required for publish job."
            exit 1
          fi

      - name: Publish packages
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
          done
