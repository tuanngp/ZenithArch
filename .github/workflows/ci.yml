name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RynorArch.slnx

      - name: Build
        run: dotnet build RynorArch.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RynorArch.slnx --configuration Release --no-build

      - name: E2E smoke tests
        run: dotnet test tests/RynorArch.E2E.Tests/RynorArch.E2E.Tests.csproj --configuration Release

      - name: Pack
        run: ./publish.ps1 -Increment None
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
