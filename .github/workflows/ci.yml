name: ci

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RynorArch.slnx

      - name: Build
        run: dotnet build RynorArch.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RynorArch.slnx --configuration Release --no-build

      - name: Vulnerability audit
        run: dotnet list RynorArch.slnx package --vulnerable --include-transitive

  pack:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RynorArch.slnx

      - name: Build, test, and pack
        run: ./publish.ps1 -Increment None
        shell: pwsh

      - name: Prepare local feed
        run: |
          mkdir -p local-feed
          cp artifacts/*.nupkg local-feed/

      - name: NuGet package integration tests
        run: dotnet test tests/RynorArch.NuGetIntegration.Tests/RynorArch.NuGetIntegration.Tests.csproj --configuration Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  publish:
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: artifacts

      - name: Validate publish secret
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is required for publish job."
            exit 1
          fi

      - name: Publish packages
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
          done
